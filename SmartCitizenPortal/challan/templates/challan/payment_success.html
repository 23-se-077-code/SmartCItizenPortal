{% extends "challan/base_challan.html" %}

{% block challan_content %}
<div class="card border-0 shadow-sm text-center">
    <div class="card-body py-5">
        <i class="fas fa-check-circle text-success" style="font-size: 5rem;"></i>
        <h2 class="text-success mt-3">Payment Successful!</h2>
        <p class="lead">Transaction ID: <strong>{{ transaction.transaction_id }}</strong></p>
        <p><strong>Amount:</strong> Rs. {{ transaction.amount }}</p>
        <p><strong>Paid on:</strong> {{ transaction.paid_at|date:"d M Y, h:i A" }}</p>
        <div class="mt-4">
            <a href="{% url 'challan:dashboard' %}" class="btn btn-success btn-lg rounded-pill px-5">Go to Dashboard</a>
            <a href="{% url 'challan:history' %}" class="btn btn-outline-secondary btn-lg rounded-pill px-5">View History</a>
        </div>
    </div>
</div>
{% endblock %}

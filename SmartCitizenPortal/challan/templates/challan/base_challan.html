{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-wallet me-2"></i>Payment Menu</h5>
                </div>
                <div class="list-group list-group-flush">
                    <a href="{% url 'challan:dashboard' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                        <i class="fas fa-home me-2 text-success"></i> Dashboard
                    </a>
                    <a href="{% url 'challan:bill_list' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                        <i class="fas fa-file-invoice me-2 text-success"></i> Pay Bills
                    </a>
                    <a href="{% url 'challan:challan_list' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                        <i class="fas fa-gavel me-2 text-success"></i> Pay Challans
                    </a>
                    <a href="{% url 'challan:history' %}" class="list-group-item list-group-item-action d-flex align-items-center">
                        <i class="fas fa-history me-2 text-success"></i> Payment History
                    </a>
                </div>
            </div>
        </div>
        <div class="col-md-9">
            {% block challan_content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}

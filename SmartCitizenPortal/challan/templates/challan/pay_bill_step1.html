{% extends "challan/base_challan.html" %}
{% block challan_content %}
<div class="card border-0 shadow-sm">
    <div class="card-header bg-success text-white text-center">
        <h4><i class="fas fa-file-invoice me-2"></i>Select Bill Category</h4>
        <p class="mb-0 text-white-50">Choose the type of bill you want to pay</p>
    </div>
    <div class="card-body">
        <div class="row g-4">
            {% for cat in categories %}
                <div class="col-md-3 col-sm-6">
                    <a href="{% url 'challan:pay_bill_step2' cat.slug %}" class="text-decoration-none">
                        <div class="card h-100 border-0 shadow-sm text-center p-3 hover-card">
                            <i class="fas {{ cat.icon }} fa-3x text-success"></i>
                            <h5 class="mt-2 text-dark">{{ cat.name }}</h5>
                        </div>
                    </a>
                </div>
            {% endfor %}
        </div>
        <div class="text-center mt-4">
            <a href="{% url 'challan:bill_list' %}" class="btn btn-outline-secondary">← Back to Bills</a>
        </div>
    </div>
</div>
<style>
    .hover-card:hover { transform: translateY(-5px); box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.1); }
</style>
{% endblock %}

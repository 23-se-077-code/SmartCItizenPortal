{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<style>
    .step-progress {
        margin-bottom: 2rem;
    }
    .step-progress .step {
        text-align: center;
        padding: 0.5rem;
        background: #f8f9fa;
        border-radius: 8px;
        margin: 0 0.25rem;
        font-size: 0.9rem;
    }
    .step-progress .step.active {
        background: #0d6efd;
        color: white;
    }
    .step-progress .step.completed {
        background: #198754;
        color: white;
    }
    .biometric-preview {
        margin-top: 10px;
        text-align: center;
    }
    .biometric-preview img {
        max-width: 150px;
        border-radius: 8px;
        border: 2px solid #ddd;
    }
    .camera-feed {
        background: #000;
        border-radius: 8px;
        width: 100%;
        max-width: 400px;
        margin: 0 auto;
        display: block;
    }
</style>
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">{% block title %}Citizen Registration{% endblock %}</h4>
                </div>
                <div class="card-body">
                    {% block wizard_content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
